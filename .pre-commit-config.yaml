repos:
  - repo: local
    hooks:
      - id: pnpm-format-check
        name: pnpm format check
        entry: pnpm run format:check
        language: system
        pass_filenames: false
      - id: pnpm-lint
        name: pnpm lint
        entry: pnpm run lint
        language: system
        pass_filenames: false
      - id: pnpm-typecheck
        name: pnpm typecheck
        entry: pnpm run typecheck
        language: system
        pass_filenames: false
