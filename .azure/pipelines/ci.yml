variables:
  NODE_VERSION: '24.x'
  PNPM_CACHE_DIR: $(Pipeline.Workspace)/.pnpm-store

stages:
  - stage: validate
    displayName: Validate
    jobs:
      - job: build_test_lint
        displayName: Build · Test · Lint
        pool:
          vmImage: ubuntu-24.04
        steps:
          - checkout: self
            clean: true

          - task: NodeTool@0
            displayName: Use Node $(NODE_VERSION)
            inputs:
              versionSpec: $(NODE_VERSION)

          - task: Cache@2
            displayName: Cache pnpm
            inputs:
              key: 'pnpm | "$(Agent.OS)" | pnpm-lock.yaml'
              restoreKeys: |
                pnpm | "$(Agent.OS)"
              path: $(PNPM_CACHE_DIR)

          - script: |
              corepack enable
              corepack prepare pnpm@11.0.9 --activate
              pnpm config set store-dir $(PNPM_CACHE_DIR)
              pnpm install --frozen-lockfile
            displayName: Install

          - script: pnpm run ci:check
            displayName: Validate package

      - job: coverage
        displayName: Coverage
        pool:
          vmImage: ubuntu-24.04
        steps:
          - checkout: self
            clean: true

          - task: NodeTool@0
            inputs:
              versionSpec: $(NODE_VERSION)

          - script: |
              corepack enable
              corepack prepare pnpm@11.0.9 --activate
              pnpm install --frozen-lockfile
            displayName: Install

          - script: pnpm run test:coverage
            displayName: Coverage

  - stage: docker
    displayName: Docker Build Verify
    dependsOn: validate
    condition: succeeded()
    jobs:
      - job: docker_build
        displayName: Docker Build
        pool:
          vmImage: ubuntu-24.04
        steps:
          - checkout: self
          - script: docker build -t mcp-health-monitor:ci .
            displayName: Docker Build
          - script: docker run --rm mcp-health-monitor:ci node dist/mcp.js --version
            displayName: Docker CLI Smoke
