name: Publish npm

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag_name:
        description: Existing component release tag for manual recovery
        required: true
        type: string
      approval_phrase:
        description: Exact approval phrase required for production publish
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  publish:
    name: Publish npm
    if: >-
      ${{
        github.repository == 'oaslananka/health-monitor-mcp' &&
        (github.event_name == 'release' ||
         (github.event_name == 'workflow_dispatch' && inputs.approval_phrase == 'APPROVE_RELEASE'))
      }}
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    environment: npm-production
    permissions:
      contents: read
      id-token: write
    env:
      RELEASE_TAG: ${{ github.event_name == 'release' && github.event.release.tag_name || inputs.tag_name }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
          fetch-depth: 0
          fetch-tags: true
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || inputs.tag_name }}

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: '24.18.0'
          registry-url: https://registry.npmjs.org

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.14.0 --activate

      - run: pnpm install --frozen-lockfile
      - name: Verify exact release ref
        run: pnpm run release:verify-ref -- --tag "$RELEASE_TAG"
      - name: Install REUSE
        run: python3 -m pip install --user reuse==6.2.0
      - run: pnpm run ci

      - name: Verify release state
        id: release-state
        run: |
          node scripts/release-state.mjs --require-tag > release-state.json
          node --input-type=module <<'NODE'
          import fs from 'node:fs';

          const state = JSON.parse(fs.readFileSync('release-state.json', 'utf8'));
          const publishedBlocker = `npm package ${state.package}@${state.version} already exists`;
          const alreadyPublished =
            state.states.includes('npm-published') &&
            state.blockers.length === 1 &&
            state.blockers[0] === publishedBlocker;

          if (!state.safe_to_publish && !alreadyPublished) {
            console.error(JSON.stringify(state, null, 2));
            process.exit(1);
          }

          fs.appendFileSync(process.env.GITHUB_OUTPUT, `npm_published=${alreadyPublished}\n`);
          NODE

      - name: Prepare package tarball
        id: package
        run: |
          pnpm pack --json --pack-destination "$RUNNER_TEMP" > publish-pack.json
          package_tarball="$(
            node --input-type=module <<'NODE'
          import fs from 'node:fs';

          const pack = JSON.parse(fs.readFileSync('publish-pack.json', 'utf8'));
          const entry = Array.isArray(pack) ? pack[0] : pack;
          if (!entry?.filename) throw new Error('pnpm pack did not report a filename');
          console.log(entry.filename);
          NODE
          )"
          test -f "$package_tarball"
          echo "tarball=$package_tarball" >> "$GITHUB_OUTPUT"

      - name: Publish package
        if: steps.release-state.outputs.npm_published != 'true'
        env:
          PACKAGE_TARBALL: ${{ steps.package.outputs.tarball }}
          LOCAL_PACKAGE_TARBALL: ${{ steps.package.outputs.tarball }}
        run: npm publish "$PACKAGE_TARBALL" --access public --provenance || node scripts/verify-npm-package.mjs

      - name: Verify npm package
        env:
          LOCAL_PACKAGE_TARBALL: ${{ steps.package.outputs.tarball }}
        run: node scripts/verify-npm-package.mjs

  publish-registry:
    name: Publish MCP Registry
    needs: publish
    if: ${{ needs.publish.result == 'success' }}
    permissions:
      contents: read
      id-token: write
    uses: ./.github/workflows/publish-mcp-registry.yml
    with:
      tag_name: ${{ github.event_name == 'release' && github.event.release.tag_name || inputs.tag_name }}
